name: Obfuscate Worker

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/worker.js"
      - "package.json"
      - "package-lock.json"
      - "obfuscator-yongk.json"
      - "obfuscator-bpb.json"
      - "obfuscator-extreme.json"
      - ".github/workflows/obfuscate.yml"
  workflow_dispatch:

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create dist folder
        run: mkdir -p dist

      - name: Build all outputs
        run: npm run build:all

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/*.js
          git diff --cached --quiet || git commit -m "Auto-generate obfuscated outputs"
          git push
